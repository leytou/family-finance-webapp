# CI：每次提交 / PR 自动跑构建 + 测试
# 通过后 README 顶部的 CI 徽章显示绿色，访客一眼能看出项目「是活的、构建通过」。
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          # 用 Node 24 / npm 11：与本地生成 package-lock.json 的环境一致，
          # 避免 npm 版本差异导致 `npm ci` 报锁文件不同步。
          node-version: 24
          cache: npm

      - name: 安装依赖
        # 用 npm install 而非 npm ci：仓库含 Rolldown/oxc-parser 等原生/wasm 绑定，
        # 锁文件在 Windows 下生成，Linux CI 用 npm ci 会因平台相关依赖缺失而失败。
        # npm install 能按当前平台自动补齐。
        run: npm install --no-fund --no-audit

      - name: 类型检查 + 构建
        run: npm run build

      - name: 运行测试
        run: npm run test
